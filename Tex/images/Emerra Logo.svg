<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="60%" stop-color="#0a1c2e"/>
      <stop offset="100%" stop-color="#0d2318"/>
    </linearGradient>
    <linearGradient id="hill-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3d2b"/>
      <stop offset="100%" stop-color="#0e2119"/>
    </linearGradient>
    <linearGradient id="hill-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1a3d2b"/>
    </linearGradient>
    <linearGradient id="hill-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="30%">
      <stop offset="0%" stop-color="#74c69d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#74c69d" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="100" height="100" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="url(#sky)"/>

  <!-- Subtle horizon glow -->
  <ellipse cx="50" cy="52" rx="45" ry="18" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="18" cy="12" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="38" cy="8"  r="0.6" fill="white" opacity="0.4"/>
  <circle cx="62" cy="14" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="80" cy="9"  r="0.7" fill="white" opacity="0.4"/>
  <circle cx="88" cy="22" r="0.5" fill="white" opacity="0.35"/>
  <circle cx="28" cy="22" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="72" cy="6"  r="0.6" fill="white" opacity="0.4"/>

  <!-- Far hill layer -->
  <path clip-path="url(#rounded)"
    d="M0,64 C8,54 18,58 28,54 C38,50 48,44 60,49 C70,53 82,46 100,52 L100,100 L0,100 Z"
    fill="url(#hill-far)"/>

  <!-- Mid hill layer -->
  <path clip-path="url(#rounded)"
    d="M0,74 C12,64 24,70 38,67 C52,64 62,60 76,65 C86,68 93,64 100,67 L100,100 L0,100 Z"
    fill="url(#hill-mid)"/>

  <!-- Front hill layer -->
  <path clip-path="url(#rounded)"
    d="M0,84 C10,78 22,82 36,80 C50,78 62,84 76,81 C86,79 94,82 100,80 L100,100 L0,100 Z"
    fill="url(#hill-front)"/>

  <!-- Subtle border -->
  <rect width="100" height="100" rx="16" fill="none" stroke="rgba(82,183,136,0.2)" stroke-width="1.5"/>
</svg>
